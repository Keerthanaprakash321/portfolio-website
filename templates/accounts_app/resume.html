{% extends 'base.html' %}
{% load static %}

{% block title %}Resume{% endblock %}

{% block content %}
<div class="container mx-auto text-center py-20 bg-[var(--bg-primary)] border border-green-900 mt-10 p-10 rounded-2xl shadow-lg ring-1 ring-[#00AA00] max-w-3xl">
    <h1 class="text-5xl font-bold mb-6 text-[#00FF00] font-mono tracking-widest drop-shadow-[0_0_10px_rgba(0,255,0,0.8)]">My Resume</h1>
    <p class="mb-12 text-xl font-mono text-[#00AA00] opacity-90 leading-relaxed">
        Download my resume to learn more about my skills, experience, and education.
    </p>
    <a href="{% static 'resume.pdf' %}" download="Keerthana_Prakash_Resume.pdf" class="download-btn-neon text-lg py-4 px-10 rounded hover:scale-110 transform transition">
        Download Resume
    </a>
</div>
{% endblock %}
