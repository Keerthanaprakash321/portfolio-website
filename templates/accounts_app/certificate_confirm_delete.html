{% extends 'base.html' %}

{% block title %}Delete Certificate{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mt-16 mb-20">
    <div class="bg-[var(--bg-primary)] p-8 rounded-lg shadow-md border border-[var(--border-color)]">
        <h2 class="text-2xl font-bold mb-6 text-[var(--text-primary)]">Delete Certificate</h2>
        
        <p class="mb-6 text-[var(--text-primary)]">
            Are you sure you want to delete the certificate <strong>"{{ certificate.title }}"</strong>? This action cannot be undone.
        </p>

        <form method="POST">
            {% csrf_token %}
            <div class="flex gap-4">
                <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 font-semibold transition-colors">
                    Yes, Delete
                </button>
                <a href="{% url 'dashboard' %}" class="bg-[var(--bg-secondary)] text-[var(--text-primary)] px-4 py-2 rounded border border-[var(--border-color)] hover:bg-[var(--bg-primary)] font-semibold transition-colors text-center inline-block">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
